<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="12" y="16" width="40" height="36" rx="8" fill="url(#g)"/>
  <!-- Antenna -->
  <line x1="32" y1="16" x2="32" y2="6" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="3" fill="#00d4ff"/>
  <!-- Eyes -->
  <circle cx="22" cy="32" r="5" fill="#0a0e1a"/>
  <circle cx="42" cy="32" r="5" fill="#0a0e1a"/>
  <circle cx="23" cy="31" r="2" fill="#fff"/>
  <circle cx="43" cy="31" r="2" fill="#fff"/>
  <!-- Mouth -->
  <rect x="24" y="42" width="16" height="3" rx="1.5" fill="#0a0e1a"/>
  <!-- Ears -->
  <rect x="6" y="24" width="6" height="12" rx="3" fill="url(#g)" opacity="0.7"/>
  <rect x="52" y="24" width="6" height="12" rx="3" fill="url(#g)" opacity="0.7"/>
</svg>